# Configuration file for CryptoMinerDetector
# National and Governmental Use Only

[API_KEYS]
# External API keys for various services
shodan_api_key = wgH9c7KfZkbXhfi4McSpivgFfsCqFAJm
censys_api_id = YOUR_CENSYS_API_ID
censys_api_secret = YOUR_CENSYS_API_SECRET
ipinfo_token = 47d74be9590d405496bc11e3a81cf407
telecom_api_key = YOUR_TELECOM_API_KEY

[NETWORK_SCANNING]
# Network scanning configuration
default_timeout = 3
max_concurrent_scans = 10
rate_limit_per_second = 100
scan_ports = 3333,4028,5555,7777,8332,8333,8555,9332,9333,14444,14433,14455
miner_protocols = stratum,getwork,getblocktemplate,submitblock

[GEOGRAPHIC_DATA]
# Iranian administrative divisions
data_source = https://api.iran.gov.ir/geographic-data
provinces_file = data/geographic_data/iran_provinces.json
cities_file = data/geographic_data/iran_cities.json
postal_codes_file = data/geographic_data/iran_postal_codes.json

[ISP_DATA]
# Iranian ISP information
isp_list_file = data/isp_ranges/iran_isps.json
ip_ranges_file = data/isp_ranges/iran_ip_ranges.json
asn_data_file = data/isp_ranges/iran_asn_data.json

[DATABASE]
# Database configuration
db_path = D:/CryptoMinerDetector/data/miner_detection.db
backup_path = D:/CryptoMinerDetector/data/backups/
log_path = D:/CryptoMinerDetector/logs/
max_db_size_gb = 10

[SECURITY]
# Security and encryption settings
encryption_key_file = D:/CryptoMinerDetector/config/encryption.key
audit_log_file = D:/CryptoMinerDetector/logs/audit.log
session_timeout_minutes = 30
max_login_attempts = 3

[REPORTING]
# Reporting and visualization
report_template_path = D:/CryptoMinerDetector/templates/
map_output_path = D:/CryptoMinerDetector/maps/
export_formats = pdf,excel,json
report_retention_days = 365

[LEGAL_COMPLIANCE]
# Legal and compliance settings
warrant_required = true
data_retention_days = 1095
privacy_protection = true
audit_trail = true
chain_of_custody = true

[SYSTEM]
# System configuration
max_memory_usage_gb = 8
cpu_usage_limit_percent = 80
temp_directory = D:/CryptoMinerDetector/temp/
auto_cleanup_days = 7